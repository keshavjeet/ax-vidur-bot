name: Build and deploy node-downstream app to Azure Web App - node-vidur-app

on:
  push:
    branches:
      - main
    paths:
      - "node-downstream/**"
      - ".github/workflows/node-downstream-azure-deploy.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: node-downstream

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: "node-downstream/package-lock.json"

      - name: Install Azure runtime workspaces only
        run: |
          npm ci \
            --workspace @node-downstream/util-websocket \
            --workspace @node-downstream/app

      - name: Build required workspaces
        run: |
          npm run build -w @node-downstream/util-websocket
          npm run build -w @node-downstream/app

      - name: Test required workspaces
        run: npm run test -w @node-downstream/util-websocket --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-downstream-app
          path: node-downstream

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-downstream-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "node-vidur-app"
          slot-name: "Production"
          package: node-downstream
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
