# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - node-vidur-app

on:
  push:
    branches:
      - main
    paths:
      - "node-downstream/**"
      - ".github/workflows/main_node-vidur-app.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    defaults:
      run:
        working-directory: node-downstream

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: "node-downstream/package-lock.json"

      - name: Install Azure runtime workspaces only
        run: |
          npm ci \
            --workspace @node-downstream/util-websocket \
            --workspace @node-downstream/app

      - name: Build required workspaces
        run: |
          npm run build -w @node-downstream/util-websocket
          npm run build -w @node-downstream/app

      - name: Test required workspaces
        run: npm run test -w @node-downstream/util-websocket --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: node-downstream

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_131BEDA14F554F9F805781C06F17721C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C6407B242E5949B7A39EF47A24F413F4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BBA335AEBA74591AFB4410541D5D5F4 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'node-vidur-app'
          slot-name: 'Production'
          package: node-app
          